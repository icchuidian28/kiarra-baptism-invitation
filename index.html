<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baptism Invitation</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        script: ['"Great Vibes"', 'cursive'],
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Poppins"', 'sans-serif'],
                    },
                    colors: {
                        floral: {
                            light: '#fdfbf7',
                            pink: '#f4e3e3',
                            green: '#e2ece4',
                            darkGreen: '#4a6750',
                            text: '#4a4a4a'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Custom Floral Background Pattern */
        body {
            background-color: #fdfbf7;
            background-image: radial-gradient(#f4e3e3 1px, transparent 1px), radial-gradient(#e2ece4 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-floral-text">

    <!-- Mobile-sized Container -->
    <main class="glass-card max-w-md w-full mx-auto rounded-3xl shadow-xl overflow-hidden relative border border-floral-pink/50">
        
        <!-- Top Floral Decoration (SVG) -->
        <div class="absolute top-0 left-0 w-full flex justify-between pointer-events-none opacity-80">
            <svg width="120" height="120" viewBox="0 0 100 100" class="text-floral-pink fill-current transform -translate-x-4 -translate-y-4">
                <path d="M50 0 C60 30 80 40 100 50 C80 60 60 70 50 100 C40 70 20 60 0 50 C20 40 40 30 50 0 Z"/>
            </svg>
            <svg width="100" height="100" viewBox="0 0 100 100" class="text-floral-green fill-current transform translate-x-4 -translate-y-4">
                <path d="M50 0 C60 30 80 40 100 50 C80 60 60 70 50 100 C40 70 20 60 0 50 C20 40 40 30 50 0 Z"/>
            </svg>
        </div>

        <div class="px-8 pt-16 pb-12 flex flex-col items-center text-center relative z-10">
            
            <p class="font-sans text-sm tracking-[0.2em] uppercase text-floral-darkGreen mb-4">You are invited to the</p>
            <h1 class="font-serif text-3xl font-semibold italic text-gray-800 mb-6">Holy Baptism</h1>
            
            <!-- Baby Image Placeholder -->
            <div class="relative mb-6">
                <!-- Decorative Ring -->
                <div class="absolute inset-[-8px] border-[3px] border-floral-pink rounded-full border-dashed animate-[spin_30s_linear_infinite]"></div>
                <div class="absolute inset-[-14px] border-[1px] border-floral-green rounded-full"></div>
                
                <!-- Image Wrapper -->
                <div class="w-40 h-40 rounded-full overflow-hidden border-4 border-white shadow-lg bg-gray-100 flex items-center justify-center relative z-10">
                    <!-- TODO: Replace 'baby.jpg' with your actual image file -->
                    <img src="baby.png" alt="Baby's Photo" class="w-full h-full object-cover" onerror="this.outerHTML='<span class=\'font-sans text-xs text-gray-400\'>Your Image Here</span>'">
                </div>
            </div>

            <p class="font-script text-5xl text-floral-darkGreen mb-8 mt-2 drop-shadow-sm">Kiarra Leigh D. Catamio</p>

            <div class="w-full space-y-6 text-left border-t border-b border-floral-green/50 py-6">
                
                <!-- Date & Time -->
                <div class="flex items-start gap-4">
                    <div class="flex-shrink-0 w-10 h-10 rounded-full bg-floral-pink/30 flex items-center justify-center text-rose-500">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5M12 15h.008v.008H12V15Z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-serif font-semibold text-gray-800 text-lg">Saturday, August 29, 2026</h3>
                        <p class="font-sans text-sm text-gray-600 mt-0.5">at 9:00 in the morning</p>
                    </div>
                </div>

                <!-- Ceremony -->
                <div class="flex items-start gap-4">
                    <div class="flex-shrink-0 w-10 h-10 rounded-full bg-floral-green/40 flex items-center justify-center text-teal-600">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0 0 12 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75Z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-serif font-semibold text-gray-800 text-lg">Holy Family Parish Church</h3>
                        <p class="font-sans text-sm text-gray-600 mt-0.5">Baptismal Ceremony</p>
                    </div>
                </div>

                <!-- Reception -->
                <div class="flex items-start gap-4">
                    <div class="flex-shrink-0 w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-500">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 0 0 1.5-.189m-1.5.189a6.01 6.01 0 0 1-1.5-.189m3.75 7.478a12.06 12.06 0 0 1-4.5 0m3.75 2.383a14.406 14.406 0 0 1-3 0M14.25 18v-.192c0-.983.658-1.82 1.508-2.316a7.5 7.5 0 1 0-7.516 0c.85.496 1.508 1.333 1.508 2.316V18w4.5Z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-serif font-semibold text-gray-800 text-lg">Parang Pavillion</h3>
                        <p class="font-sans text-sm text-gray-600 mt-0.5">Lunch Reception to follow</p>
                    </div>
                </div>

            </div>

            <div class="mt-8">
                <p class="font-serif italic text-gray-600 text-sm mb-1">Please RSVP by August 15, 2026</p>
                <p class="font-sans font-medium text-floral-darkGreen text-sm">[Add Contact Number]</p>
            </div>

        </div>

        <!-- Bottom Floral Decoration (SVG) -->
        <div class="absolute bottom-0 right-0 w-full flex justify-between pointer-events-none opacity-80 rotate-180">
            <svg width="100" height="100" viewBox="0 0 100 100" class="text-floral-pink fill-current transform -translate-x-4 -translate-y-4">
                <path d="M50 0 C60 30 80 40 100 50 C80 60 60 70 50 100 C40 70 20 60 0 50 C20 40 40 30 50 0 Z"/>
            </svg>
        </div>
    </main>

</body>
</html>
