<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiarra's Baptism</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(circle at top left, #fdf4f4, #f0fdf4);
            min-height: 100vh;
        }

        /* Whimsical Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        .float-animation { animation: float 6s ease-in-out infinite; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Mobile-sized Container -->
    <main class="glass-card max-w-md w-full mx-auto rounded-[3rem] shadow-2xl overflow-hidden relative">
        
        <!-- Whimsical Floral Elements -->
        <div class="absolute -top-10 -left-10 w-40 h-40 float-animation opacity-60">
            <svg viewBox="0 0 100 100" class="w-full h-full text-pink-300 fill-current">
                <path d="M50 0c15 10 25 30 20 50s-20 20-40 20-25-10-20-30S35 0 50 0z"/>
                <path d="M70 20c15 10 20 25 10 40s-25 10-35-5S55 10 70 20z"/>
            </svg>
        </div>
        <div class="absolute -bottom-10 -right-10 w-48 h-48 float-animation opacity-60" style="animation-delay: 2s;">
            <svg viewBox="0 0 100 100" class="w-full h-full text-green-300 fill-current">
                <path d="M20 80c20 20 50 10 60-10s0-40-30-40-40 20-30 50z"/>
                <path d="M40 60c10 20 30 15 35 0s-5-25-20-25-25 10-15 25z"/>
            </svg>
        </div>

        <div class="px-8 pt-16 pb-12 flex flex-col items-center text-center relative z-10">
            
            <p class="font-sans text-xs tracking-[0.3em] uppercase text-emerald-800 mb-2 opacity-80">You are invited to the</p>
            <h1 class="font-serif text-4xl italic text-emerald-900 mb-6">Holy Baptism</h1>
            
            <!-- Baby Image -->
            <div class="relative mb-8">
                <div class="absolute inset-[-10px] border-2 border-dashed border-pink-300 rounded-full animate-[spin_20s_linear_infinite]"></div>
                <div class="w-40 h-40 rounded-full overflow-hidden border-4 border-white shadow-xl bg-gray-100">
                    <img src="baby.png" alt="Baby's Photo" class="w-full h-full object-cover">
                </div>
            </div>

            <h2 class="font-script text-5xl text-emerald-900 mb-8">Kiarra Leigh D. Catamio</h2>

            <div class="w-full space-y-6 text-left border-y border-emerald-900/10 py-8">
                
                <!-- Date -->
                <div class="flex items-center gap-4">
                    <div class="text-pink-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    </div>
                    <div>
                        <p class="font-serif font-bold text-gray-800">Saturday, August 29, 2026</p>
                        <p class="font-sans text-sm text-gray-600">9:00 AM</p>
                    </div>
                </div>

                <!-- Church -->
                <div class="flex items-center gap-4">
                    <div class="text-emerald-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                    </div>
                    <div>
                        <p class="font-serif font-bold text-gray-800">Holy Family Parish Church</p>
                        <p class="font-sans text-sm text-gray-600">Baptismal Ceremony</p>
                    </div>
                </div>

                <!-- Reception -->
                <div class="flex items-center gap-4">
                    <div class="text-orange-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7" /></svg>
                    </div>
                    <div>
                        <p class="font-serif font-bold text-gray-800">Parang Pavillion</p>
                        <p class="font-sans text-sm text-gray-600">Lunch Reception to follow</p>
                    </div>
                </div>

            </div>

            <div class="mt-8 text-center">
                <p class="font-sans text-sm text-gray-500 italic">Please kindly RSVP by August 15</p>
                <p class="font-sans font-medium text-emerald-800 mt-2">[Insert Contact Number]</p>
            </div>

        </div>
    </main>

</body>
</html>
